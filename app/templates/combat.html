{% extends 'base.html' %}
{% block title %}Combat{% endblock %}
{% block content %}
<div class="container mt-3 combat-container" id="combat-root" data-combat-id="{{ combat_id }}">
    <div class="row g-3 combat-layout">
        <!-- Left: Monster panel (col-lg-3) -->
        <div class="col-lg-3 col-md-4 order-lg-1 order-1" id="combat-left">
            <div class="card monster-panel" id="monster-panel" role="group" aria-label="Monster status">
                <div class="card-header d-flex justify-content-between align-items-center">
                    <span id="monster-name">Monster</span>
                    <span class="badge bg-secondary" id="monster-level"></span>
                </div>
                <div class="card-body d-flex flex-column">
                    <div class="progress mb-2" style="height:20px;">
                        <div class="progress-bar bg-danger" id="monster-hp-bar" role="progressbar" style="width:0%">0 /
                            0</div>
                    </div>
                    <div id="monster-traits" class="small text-muted flex-grow-1"></div>
                </div>
            </div>
        </div>
        <!-- Center: Combat log (col-lg-5) -->
        <div class="col-lg-5 col-md-12 order-lg-2 order-3" id="combat-center">
            <div class="card d-flex flex-column" aria-label="Combat log and turn feed">
                <div class="card-header">Combat Log</div>
                <div class="card-body p-2 d-flex flex-column combat-log-wrapper">
                    <div id="combat-log" class="flex-grow-1 combat-log" role="log" aria-live="polite"
                        aria-relevant="additions"></div>
                </div>
            </div>
        </div>
        <!-- Right: Party panels / actions (col-lg-4) -->
        <div class="col-lg-4 col-md-8 order-lg-3 order-2" id="combat-right" role="group" aria-label="Party members">
            <div class="col" id="party-panels" role="list"><!-- Party member panels injected here --></div>
            <div id="combat-rewards-anchor"></div>
        </div>
    </div>
    <div id="combat-turn-live" class="visually-hidden" aria-live="assertive" aria-atomic="true"></div>
</div>
{% endblock %}
{% block scripts %}
<link rel="stylesheet" href="{{ asset_url('css/combat.css') }}">
<script src="{{ asset_url('js/combat.js') }}"></script>
{% endblock %}
