name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_DB: adventure_test
          POSTGRES_USER: adventure
          POSTGRES_PASSWORD: test_password
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
            python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          if [ -f requirements-dev.txt ]; then pip install -r requirements-dev.txt; fi
          pip install pre-commit pytest pytest-cov ruff

      - name: Run pre-commit
        run: pre-commit run --all-files

      - name: Check exception handling
        run: |
          python scripts/fix_exception_handling.py --check || true

      - name: Run tests
        env:
          DATABASE_URL: postgresql://adventure:test_password@localhost:5432/adventure_test
          SECRET_KEY: test-secret-key-for-ci
        run: pytest -q --maxfail=1 --disable-warnings --cov=app --cov-report=term-missing

      - name: Lint (ruff)
        run: ruff check .

      - name: Enforce minimum coverage
        run: |
          coverage=$(pytest --cov=app --cov-report=term | awk '/TOTAL/ {print $4}' | sed 's/%//') || true
          echo "Detected coverage: $coverage%"
          # Minimum enforced coverage threshold (raised from 60 -> 80 after test suite expansion)
          min=80
          awk -v c=$coverage -v m=$min 'BEGIN { if (c+0 < m) { printf("Coverage %.1f%% below minimum %d%%\n", c, m); exit 1 } }'

      - name: Coverage (optional)
        if: always()
        run: |
          if python -c "import pytest_cov" 2>/dev/null; then pytest --cov=app --cov-report=term-missing; else echo "pytest-cov not installed"; fi

  docker-build:
    runs-on: ubuntu-latest
    needs: build-test

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        run: docker build -t adventure-mud:latest .

      - name: Test Docker image
        run: |
          docker run --rm -e DATABASE_URL=sqlite:///test.db adventure-mud:latest python -c "print('Docker image OK')"
