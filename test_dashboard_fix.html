<!DOCTYPE html>
<html>

<head>
    <title>Dashboard Fix Test</title>
    <style>
        .party-select {
            margin: 10px;
        }

        button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        button:not(:disabled) {
            background: #ffc107;
        }
    </style>
</head>

<body>
    <h1>Dashboard Button Enable Test</h1>

    <div>
        <h3>Select Characters (1-4):</h3>
        <div class="character-card" data-id="1">
            <label>
                <input class="party-select form-check-input" type="checkbox" data-id="1" data-name="Hero 1">
                Hero 1 (Fighter)
            </label>
        </div>
        <div class="character-card" data-id="2">
            <label>
                <input class="party-select form-check-input" type="checkbox" data-id="2" data-name="Hero 2">
                Hero 2 (Mage)
            </label>
        </div>
        <div class="character-card" data-id="3">
            <label>
                <input class="party-select form-check-input" type="checkbox" data-id="3" data-name="Hero 3">
                Hero 3 (Rogue)
            </label>
        </div>
        <div class="character-card" data-id="4">
            <label>
                <input class="party-select form-check-input" type="checkbox" data-id="4" data-name="Hero 4">
                Hero 4 (Cleric)
            </label>
        </div>
    </div>

    <div id="party-table" style="margin: 20px 0; padding: 10px; background: #f0f0f0;"></div>
    <div id="party-hidden-inputs"></div>

    <div>
        <button id="begin-adventure-btn" disabled>Begin Adventure</button>
        <span id="party-count">0</span> / 4 selected
    </div>

    <script>
        // Simplified version of the fixed dashboard.js
        (function () {
            const selects = Array.from(document.querySelectorAll('.party-select'));
            const beginBtn = document.getElementById('begin-adventure-btn');
            const partyCount = document.getElementById('party-count');
            const partyTable = document.getElementById('party-table');

            console.log('[Test] Initialized:', {
                checkboxes: selects.length,
                beginBtn: !!beginBtn
            });

            function getSelected() {
                return selects.filter(cb => cb.checked);
            }

            function updatePartyUI() {
                const sel = getSelected();
                console.log('[Test] updatePartyUI called, selected:', sel.length);

                if (partyCount) partyCount.textContent = sel.length;

                if (beginBtn) {
                    const shouldEnable = sel.length >= 1 && sel.length <= 4;
                    beginBtn.disabled = !shouldEnable;
                    console.log('[Test] Button state:', { selected: sel.length, disabled: !shouldEnable });
                }

                if (partyTable) {
                    if (sel.length === 0) {
                        partyTable.innerHTML = '<p>No characters selected</p>';
                    } else {
                        partyTable.innerHTML = '<p>Selected: ' + sel.map(cb => cb.getAttribute('data-name')).join(', ') + '</p>';
                    }
                }
            }

            selects.forEach(cb => {
                cb.addEventListener('change', updatePartyUI);
            });

            updatePartyUI();
        })();
    </script>
</body>

</html>
